<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>魔法大師 V33 - 視覺強化版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --m-purple: #1A1A2E; --m-gold: #FFD700; --m-blue: #00D2FF; --m-deep: #16213E; --m-red: #FF3B30; --m-parchment: #fdf5e6; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; background: var(--m-purple); color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .page { display: none; padding: 20px; box-sizing: border-box; min-height: 100dvh; flex-direction: column; }
        .page.active { display: flex; }

        .wizard-icon { font-size: 70px; text-align: center; margin: 10px 0; filter: drop-shadow(0 0 15px var(--m-blue)); animation: float 3s ease-in-out infinite; }
        .energy-bar { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 15px; margin: 10px 0; font-size: 14px; border-left: 5px solid var(--m-gold); }
        .magic-card { background: var(--m-parchment); color: #333; border-radius: 20px; padding: 20px; text-align: center; border: 5px solid var(--m-blue); box-shadow: 0 0 20px var(--m-blue); position: relative; min-height: 120px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        .speaker-btn { font-size: 80px; cursor: pointer; animation: pulse 2s infinite; }
        .word-display { font-size: 70px; font-weight: 900; letter-spacing: 8px; color: #222; }

        .tome-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; overflow-y: auto; flex-grow: 1; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 15px; }
        .scroll-icon { background: rgba(255,255,255,0.08); border: 1px solid var(--m-gold); border-radius: 10px; padding: 10px 5px; text-align: center; font-size: 9px; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .scroll-icon b { margin-top: 5px; color: var(--m-gold); display: block; width: 100%; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        .review-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .preview-img { width: 80px; height: 50px; object-fit: contain; background: #fff; border-radius: 5px; border: 2px solid var(--m-gold); cursor: zoom-in; }

        #zoom-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 9999; display:none; align-items:center; justify-content:center; }
        #zoom-modal img { max-width: 95%; max-height: 85%; border: 3px solid white; border-radius: 10px; }
        #effect-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .magic-visual { width: 250px; height: 250px; border-radius: 50%; opacity: 0; transition: 0.3s; border: 10px double var(--m-gold); }
        
        /* 魔法特效樣式 */
        .fx-fire { animation: fx-anim 1s forwards; border-color: #FF4500; box-shadow: 0 0 50px #FF4500; }
        .fx-ice { animation: fx-anim 1s forwards; border-color: #00D2FF; box-shadow: 0 0 50px #00D2FF; }
        .fx-light { animation: fx-anim 1s forwards; border-color: #FFFF00; box-shadow: 0 0 50px #FFFF00; }
        .fx-wind { animation: fx-anim 1s forwards; border-color: #00FF7F; }
        .fx-earth { animation: fx-anim 1s forwards; border-color: #8B4513; }
        .fx-shield { animation: fx-anim 1s forwards; border-color: #FFFFFF; }

        @keyframes fx-anim { 0% { transform: scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(5deg); } 75% { transform: rotate(-5deg); } }

        .btn { padding: 15px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin: 5px 0; width: 100%; text-align: center; display: block; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(45deg, var(--m-gold), #FFA500); color: black; }
        .btn-outline { background: transparent; border: 2px solid var(--m-blue); color: white; }
        .btn-mode { background: rgba(255,255,255,0.1); border: 2px solid var(--m-gold); color: var(--m-gold); padding: 20px; font-size: 20px; }

        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .detail-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 7000; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .scroll-full { background: #e3d5b8; width: 100%; max-width: 320px; padding: 40px 20px; border-radius: 5px; border-left: 15px solid #8b4513; border-right: 15px solid #8b4513; color: #333; text-align: center; position: relative; }
    </style>
</head>
<body>

<div id="zoom-modal" onclick="this.style.display='none'"><img id="zoom-img" src=""></div>

<div id="detail-modal" class="detail-modal" onclick="closeDetail()">
    <div class="scroll-full" onclick="event.stopPropagation()">
        <p style="font-weight: bold; color: #8b4513; text-transform: uppercase;" id="detail-attr">ELEMENT</p>
        <div style="font-size: 60px;">📜</div>
        <h1 id="detail-name">...</h1>
        <button class="btn btn-gold" id="detail-cast-btn">✨ 釋放魔法</button>
    </div>
</div>

<div id="loader" class="loader">
    <div style="border: 4px solid #333; border-top: 4px solid var(--m-gold); width: 40px; height: 40px; border-radius: 50%; animation: rotate 1s linear infinite;"></div>
    <p id="loader-text" style="margin-top:15px; color:var(--m-gold); font-weight: bold;">正在運用視覺魔法鑑定...</p>
    <div style="width:80%; height:10px; background:#333; border-radius:5px; margin-top:10px; overflow:hidden; border:1px solid var(--m-gold);"><div id="progress-fill" style="width:0%; height:100%; background:var(--m-gold); transition:0.3s;"></div></div>
</div>

<!-- 1. 角色選擇 -->
<div id="page-intro" class="page active">
    <div class="wizard-icon">🧙‍♂️</div>
    <h2 style="text-align: center; color: var(--m-gold); margin: 0;">真理之書：AI 強化版</h2>
    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
        <div class="btn btn-outline" onclick="selectUser('小緁')">🪄 魔法師：小緁</div>
        <div class="btn btn-outline" onclick="selectUser('小鈞')">🪄 魔法師：小鈞</div>
        <div class="btn btn-outline" style="border-color: var(--m-gold); color: var(--m-gold);" onclick="selectUser('小凱')">🛠️ 測試員：小凱</div>
    </div>
</div>

<!-- 2. 圖鑑主頁 -->
<div id="page-home" class="page">
    <div style="display:flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
        <h3 style="color: var(--m-gold); margin: 0;">📜 <span id="display-user"></span>的圖鑑</h3>
        <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:2px 8px; font-size:11px;">登出</button>
    </div>
    <div class="energy-bar">⚡ 今日領獎餘額：<span id="daily-energy">3 / 3</span></div>
    <div id="tome-grid" class="tome-grid"></div>
    <div style="margin-top: 15px;"><button id="start-btn" class="btn btn-gold" onclick="showPage('page-mode-select')">⚔️ 開始試煉挑戰</button></div>
</div>

<!-- 3. 模式選擇 -->
<div id="page-mode-select" class="page">
    <h2 style="text-align: center; color: var(--m-gold);">🔮 選擇試煉形式</h2>
    <div style="display: flex; flex-direction: column; gap: 20px; justify-content: center; flex-grow: 1;">
        <div class="btn btn-mode" onclick="startGame('dictation')">🎧 聽寫測驗</div>
        <div class="btn btn-mode" onclick="startGame('copying')">✍️ 照著寫測驗</div>
    </div>
    <button class="btn btn-outline" onclick="showPage('page-home')">返回圖鑑</button>
</div>

<!-- 4. 試煉拍照 -->
<div id="page-collect" class="page">
    <div style="display:flex; justify-content: space-between;">
        <span id="progress-label" style="color:var(--m-gold); font-weight:bold;">1 / 10</span>
        <button onclick="stopCameraAndHome()" style="background:none; color:white; border:none; font-size:20px;">✕</button>
    </div>
    
    <div class="magic-card" style="margin-top:10px;">
        <div id="ui-dictation" style="display:none;">
            <p style="margin:0; color:#888;">點擊聽取讀音</p>
            <div class="speaker-btn" onclick="speakCurrentWord()">🔊</div>
        </div>
        <div id="ui-copying" style="display:none;">
            <p style="margin:0; color:#888;">請依照文字書寫</p>
            <div id="target-word" class="word-display">...</div>
        </div>
    </div>

    <div class="camera-container" style="position: relative; width: 100%; height: 260px; background: #000; border-radius: 20px; overflow: hidden; margin-top: 15px; border: 2px solid var(--m-blue);">
        <video id="video" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
        <div class="viewfinder" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 90px; border: 3px solid var(--m-gold); border-radius: 10px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none;"></div>
    </div>
    <button class="btn btn-gold" style="margin-top:15px;" onclick="snap符文()">🔮 鎖定並錄入符文</button>
    <div id="preview-box" style="display:none; text-align:center; margin-top:5px;">
        <img id="capture-preview" style="width:120px; border:2px solid var(--m-blue); border-radius:5px;">
        <p style="color:var(--m-blue); font-size:12px;">✅ 符文已錄入</p>
    </div>
    <button id="btn-next" class="btn btn-outline" style="margin-top:auto;" onclick="nextStep()">下一步</button>
</div>

<!-- 5. 鑑定室 -->
<div id="page-review" class="page">
    <h3 style="text-align: center; color: var(--m-gold);">🔍 鑑定中心 (格線過濾版)</h3>
    <div id="review-list" class="review-list" style="flex-grow: 1; overflow-y: auto;"></div>
    <button class="btn btn-gold" id="btn-ai-start" onclick="startAI()">🚀 啟動 AI 鑑定全部</button>
    <button id="final-btn" class="btn btn-gold" style="display:none;" onclick="finishReview()">🔓 結算成果</button>
</div>

<!-- 6. 寶箱 -->
<div id="page-treasure" class="page">
    <h2 style="text-align: center; color: var(--m-gold);">🎁 命運藏寶室</h2>
    <div id="chest-zone" style="display: flex; justify-content: space-around; margin-top: 40px;">
        <div class="chest shake" style="font-size: 60px; cursor: pointer;" onclick="openChest(this)">📦</div>
        <div class="chest shake" style="font-size: 60px; cursor: pointer;" onclick="openChest(this)">📦</div>
        <div class="chest shake" style="font-size: 60px; cursor: pointer;" onclick="openChest(this)">📦</div>
    </div>
    <div id="prize-reveal" style="display:none; text-align:center; margin-top:20px;">
        <h1 id="prize-name" style="color:var(--m-gold);">...</h1>
        <button class="btn btn-gold" onclick="showPage('page-home')">返回圖鑑</button>
    </div>
</div>

<div id="effect-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9000; display: flex; align-items: center; justify-content: center;">
    <div id="magic-visual" class="magic-visual"></div>
</div>

<canvas id="proc-canvas" style="display:none;"></canvas>

<script>
    const defaultSpells = [
        {n: "火球術", t: "fire"}, {n: "冰晶陣", t: "ice"}, {n: "雷神怒", t: "light"}, {n: "風之翼", t: "wind"}, {n: "地動波", t: "earth"}, {n: "聖光盾", t: "shield"},
        {n: "炎爆術", t: "fire"}, {n: "絕對零度", t: "ice"}, {n: "連鎖閃電", t: "light"}, {n: "疾風步", t: "wind"}, {n: "崩山裂地", t: "earth"}, {n: "淨化之光", t: "light"},
        {n: "餘燼之握", t: "fire"}, {n: "極地風暴", t: "ice"}, {n: "聖域保護", t: "shield"}, {n: "萬象星隕", t: "fire"}, {n: "寒冬之怒", t: "ice"},
        {n: "霹靂一擊", t: "light"}, {n: "龍捲狂襲", t: "wind"}, {n: "金石之軀", t: "earth"}, {n: "太陽射線", t: "fire"}, {n: "霜凍新星", t: "ice"},
        {n: "雷霆萬鈞", t: "light"}, {n: "雲隱術", t: "wind"}, {n: "流沙領域", t: "earth"}, {n: "天使之淚", t: "light"}, {n: "鳳凰涅槃", t: "fire"},
        {n: "冰牆術", t: "ice"}, {n: "電光火石", t: "light"}, {n: "疾風之怒", t: "wind"}, {n: "地裂震波", t: "earth"}, {n: "聖潔光輝", t: "shield"},
        {n: "紅蓮業火", t: "fire"}, {n: "碎冰擊", t: "ice"}, {n: "閃電殘影", t: "light"}, {n: "真空裂縫", t: "wind"}, {n: "重力壓制", t: "earth"},
        {n: "生命復甦", t: "light"}, {n: "餘燼風暴", t: "fire"}, {n: "極地冰柱", t: "ice"}, {n: "雷鳴爆破", t: "light"}, {n: "裂空斬", t: "wind"},
        {n: "晶礦爆裂", t: "earth"}, {n: "奧義法球", t: "light"}, {n: "熔岩噴發", t: "fire"}, {n: "寒冰箭", t: "ice"}, {n: "磁力風暴", t: "light"},
        {n: "暴風之眼", t: "wind"}, {n: "鋼鐵意志", t: "earth"}, {n: "荊棘叢生", t: "earth"}
    ];
    const officialWords = {
        "小鈞": ["畫畫", "送給", "一顆", "寫下", "祝福", "一張", "可愛", "笑臉", "感謝", "老師", "啊", "還要", "漂亮", "蛋糕"],
        "小緁": ["傘", "烏雲", "天色暗", "爺爺", "猜字", "謎語", "撐開", "屋頂", "柺杖", "滴滴答答", "叩", "嘻嘻哈哈", "落下來", "大街", "答案", "園丁", "公園", "每天", "認真", "比", "遊客", "相當", "高興", "拍照", "草皮", "摘花", "立布告牌", "各位", "重新", "它", "欣賞", "奇妙"],
        "小凱": ["測試", "符文", "成功"]
    };

    let currentUser = "", currentMode = "", wordPool = [], mySpells = [], usedWords = [], currentIdx = 0, workbook = [], maxChallenges = 10, stream = null, chestLocked = false;

    // --- 核心改進：Vision AI 影像預處理演算法 ---
    async function advancedPreprocess(base64) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.getElementById('proc-canvas');
                const ctx = cvs.getContext('2d');
                const scale = 800 / img.width;
                cvs.width = 800; cvs.height = img.height * scale;
                ctx.drawImage(img, 0, 0, 800, cvs.height);
                
                const imgData = ctx.getImageData(0, 0, 800, cvs.height);
                const data = imgData.data;

                // 1. 強力過濾背景格線：只保留極深色的像素（筆劃）
                for (let i = 0; i < data.length; i += 4) {
                    const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                    // 閾值調低 (110)，這會讓淡灰色的格線變成純白 (255)，黑色筆劃變成純黑 (0)
                    const val = avg < 110 ? 0 : 255;
                    data[i] = data[i+1] = data[i+2] = val;
                }
                ctx.putImageData(imgData, 0, 0);

                // 2. 影像膨脹（加粗筆劃）：補償手寫筆劃太細的問題
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = cvs.width; tempCanvas.height = cvs.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(cvs, 1, 1); // 輕微偏移重疊實現膨脹效果
                ctx.globalAlpha = 0.5;
                ctx.drawImage(tempCanvas, -1, -1);
                ctx.globalAlpha = 1.0;

                resolve(cvs.toDataURL('image/jpeg', 0.9));
            };
            img.src = base64;
        });
    }

    // --- 模式與角色 ---
    window.selectUser = name => {
        currentUser = name; maxChallenges = (name === '小凱') ? 2 : 10;
        document.getElementById('display-user').innerText = name;
        mySpells = JSON.parse(localStorage.getItem('m_mine_' + currentUser)) || [];
        usedWords = JSON.parse(localStorage.getItem('m_used_' + currentUser)) || [];
        showPage('page-home');
    };

    window.startGame = mode => {
        currentMode = mode;
        let pool = officialWords[currentUser] || [];
        let avail = pool.filter(w => !usedWords.includes(w));
        if (avail.length < maxChallenges) { usedWords = []; avail = pool; }
        challenges = avail.sort(() => 0.5 - Math.random()).slice(0, maxChallenges);
        usedWords = [...usedWords, ...challenges];
        localStorage.setItem('m_used_' + currentUser, JSON.stringify(usedWords));
        currentIdx = 0; workbook = []; showPage('page-collect'); startCamera(); updateUI();
    };

    window.showPage = id => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'page-home') renderHome();
    };

    // --- 導覽與渲染 ---
    window.renderHome = () => {
        const grid = document.getElementById('tome-grid'); grid.innerHTML = '';
        defaultSpells.forEach(s => {
            const has = mySpells.some(m => m.n === s.n);
            const div = document.createElement('div');
            div.className = 'scroll-icon'; div.style.opacity = has ? "1" : "0.2";
            div.innerHTML = `<span>📜</span><b>${s.n}</b>`;
            if(has) div.onclick = () => openDetail(s);
            grid.appendChild(div);
        });
        const stats = getDailyStats();
        document.getElementById('daily-energy').innerText = (3 - stats.count) + " / 3";
        const btn = document.getElementById('start-btn');
        btn.disabled = (stats.count >= 3);
        btn.innerText = (stats.count >= 3) ? "今日法力耗盡" : `⚔️ 開始試煉挑戰`;
    };

    window.openDetail = s => {
        document.getElementById('detail-name').innerText = s.n;
        document.getElementById('detail-attr').innerText = s.t.toUpperCase();
        document.getElementById('detail-cast-btn').onclick = () => { castMagic(s.t); closeDetail(); };
        document.getElementById('detail-modal').style.display = 'flex';
    };
    window.closeDetail = () => { document.getElementById('detail-modal').style.display = 'none'; };

    // --- 相機與錄入 ---
    async function startCamera() {
        try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } }); document.getElementById('video').srcObject = stream; } 
        catch (e) { alert("相機授權失敗"); }
    }

    window.snap符文 = () => {
        const video = document.getElementById('video'), canvas = document.getElementById('proc-canvas'), ctx = canvas.getContext('2d');
        const vw = video.videoWidth, vh = video.videoHeight;
        const cropW = vw * 0.8, cropH = vh * 0.25;
        canvas.width = cropW; canvas.height = cropH;
        ctx.drawImage(video, (vw-cropW)/2, (vh-cropH)/2, cropW, cropH, 0, 0, cropW, cropH);
        const data = canvas.toDataURL('image/jpeg', 0.9);
        workbook[currentIdx] = { word: challenges[currentIdx], rawPhoto: data, status: null };
        document.getElementById('capture-preview').src = data; document.getElementById('preview-box').style.display = 'block';
    };

    function updateUI() {
        document.getElementById('progress-label').innerText = `${currentIdx+1} / ${maxChallenges}`;
        document.getElementById('target-word').innerText = challenges[currentIdx];
        document.getElementById('preview-box').style.display = 'none';
        document.getElementById('btn-next').innerText = (currentIdx === maxChallenges - 1) ? "拍照完成" : "下一題";
        if (currentMode === 'dictation') {
            document.getElementById('ui-dictation').style.display = 'block';
            document.getElementById('ui-copying').style.display = 'none';
            setTimeout(() => speakCurrentWord(), 500);
        } else {
            document.getElementById('ui-dictation').style.display = 'none';
            document.getElementById('ui-copying').style.display = 'block';
        }
    }

    window.nextStep = () => {
        if(!workbook[currentIdx]) return alert("請先拍照");
        if(currentIdx < maxChallenges - 1) { currentIdx++; updateUI(); }
        else { if(stream) stream.getTracks().forEach(t=>t.stop()); showPage('page-review'); renderReview(); }
    }

    // --- 鑑定邏輯 ---
    function renderReview() {
        const list = document.getElementById('review-list'); list.innerHTML = '';
        workbook.forEach((item, i) => {
            const div = document.createElement('div'); div.className = 'review-item';
            let icon = item.status === true ? '✅' : (item.status === false ? '❌' : '⏳');
            let btn = item.status === true ? `<button onclick="manual(${i}, false)" class="btn-mini" style="background:var(--m-red)">取消</button>` : `<button onclick="manual(${i}, true)" class="btn-mini" style="background:#555">通過</button>`;
            div.innerHTML = `<img src="${item.rawPhoto}" class="preview-img" onclick="window.openZoom(this.src)"><div style="flex:1; font-size:12px;"><b>${item.word}</b><br>${btn}</div><div style="font-size:20px">${icon}</div>`;
            list.appendChild(div);
        });
        document.getElementById('final-btn').style.display = workbook.every(i => i.status !== null) ? 'block' : 'none';
    }

    window.manual = (i, stat) => { workbook[i].status = stat; renderReview(); };

    window.startAI = async () => {
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('btn-ai-start').style.display = 'none';
        try {
            const worker = await Tesseract.createWorker('chi_tra');
            for(let i=0; i<workbook.length; i++){
                document.getElementById('progress-fill').style.width = ((i+1)/workbook.length*100)+'%';
                // 採用 Vision AI 強化預處理
                const processed = await advancedPreprocess(workbook[i].rawPhoto);
                const res = await worker.recognize(processed);
                const txt = res.data.text.replace(/\s/g, '');
                let match = txt.includes(workbook[i].word);
                if(!match){
                    let c = 0; for(let char of workbook[i].word) if(txt.includes(char)) c++;
                    match = (c/workbook[i].word.length) >= 0.7;
                }
                workbook[i].status = match; renderReview();
            }
            await worker.terminate();
        } catch (e) { alert("辨識錯誤"); }
        document.getElementById('loader').style.display = 'none';
    };

    window.finishReview = () => { chestLocked = false; showPage('page-treasure'); };

    window.openChest = el => {
        if(chestLocked) return; chestLocked = true;
        document.querySelectorAll('.chest').forEach(c => c.classList.add('disabled'));
        el.style.animation = "shake 0.5s 2";
        const score = workbook.filter(i => i.status === true).length;
        const stats = getDailyStats();
        setTimeout(() => {
            document.getElementById('chest-zone').style.display = 'none';
            const reveal = document.getElementById('prize-reveal'); reveal.style.display = "block";
            if (score >= (maxChallenges * 0.8)) {
                const ungot = defaultSpells.filter(s => !mySpells.some(m => m.n === s.n));
                const prize = ungot.length > 0 ? ungot[Math.floor(Math.random()*ungot.length)] : defaultSpells[Math.floor(Math.random()*defaultSpells.length)];
                if(!mySpells.some(m => m.n === prize.n)) { mySpells.push(prize); localStorage.setItem('m_mine_' + currentUser, JSON.stringify(mySpells)); }
                stats.count++; localStorage.setItem('m_daily_'+currentUser, JSON.stringify(stats));
                confetti({ particleCount: 150, spread: 70 });
                document.getElementById('prize-name').innerText = `獲得：${prize.n}`;
            } else { document.getElementById('prize-name').innerText = "修煉不足！"; }
        }, 1000);
    };

    // --- 輔助工具 ---
    window.speakWord = text => {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW'; msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    };
    window.speakCurrentWord = () => { if (challenges[currentIdx]) speakWord(challenges[currentIdx]); };
    window.openZoom = s => { document.getElementById('zoom-img').src = s; document.getElementById('zoom-modal').style.display = 'flex'; };
    window.stopCameraAndHome = () => { if(stream) stream.getTracks().forEach(t=>t.stop()); showPage('page-home'); };
    function getDailyStats() {
        const today = new Date().toLocaleDateString();
        const key = 'm_daily_' + currentUser;
        let stats = { date: today, count: 0 };
        try { const data = localStorage.getItem(key); if(data) { const p = JSON.parse(data); if(p.date === today) stats = p; } } catch(e) {}
        return stats;
    }
    window.castMagic = type => {
        const visual = document.getElementById('magic-visual'); visual.className = 'magic-visual fx-' + type; visual.style.opacity = "1";
        setTimeout(() => visual.style.opacity = "0", 1500);
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>魔法大師 V46 - 完美修復版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --m-purple: #1A1A2E; --m-gold: #FFD700; --m-blue: #00D2FF; --m-deep: #16213E; --m-red: #FF3B30; --m-parchment: #fdf5e6; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; background: var(--m-purple); color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .page { display: none; padding: 20px; box-sizing: border-box; min-height: 100dvh; flex-direction: column; }
        .page.active { display: flex; }
        .wizard-icon { font-size: 60px; text-align: center; margin: 10px 0; animation: float 3s infinite; }
        .energy-bar { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 15px; margin: 10px 0; font-size: 14px; border-left: 5px solid var(--m-gold); }
        .magic-card { background: var(--m-parchment); color: #333; border-radius: 20px; padding: 20px; text-align: center; border: 4px solid var(--m-blue); box-shadow: 0 0 20px var(--m-blue); display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .word-display { font-size: 50px; font-weight: 900; letter-spacing: 5px; color: #222; }
        .tome-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow-y: auto; flex-grow: 1; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 15px; }
        .scroll-icon { background: rgba(255,255,255,0.08); border: 1px solid var(--m-gold); border-radius: 10px; padding: 5px; text-align: center; font-size: 9px; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.2; }
        .btn { padding: 15px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin: 5px 0; width: 100%; text-align: center; display: block; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(45deg, var(--m-gold), #FFA500); color: black !important; }
        .btn-outline { background: transparent; border: 2px solid var(--m-blue); color: white !important; }
        .review-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; }
        .preview-img { width: 80px; height: 50px; object-fit: contain; background: #fff; border-radius: 5px; border: 1px solid var(--m-gold); }
        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .progress-bar { width: 80%; height: 10px; background: #333; border-radius: 5px; margin-top: 10px; overflow: hidden; border: 1px solid var(--m-gold); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div style="border: 4px solid #333; border-top: 4px solid var(--m-gold); width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="margin-top:15px; color:var(--m-gold);">正在連線雲端大腦鑑定...</p>
    <div class="progress-bar"><div id="progress-fill" style="width:0%; height:100%; background:var(--m-gold); transition:0.3s;"></div></div>
</div>

<!-- 1. 角色與金鑰 -->
<div id="page-intro" class="page active">
    <div class="wizard-icon">🧙‍♂️</div>
    <h2 style="text-align: center; color: var(--m-gold);">真理之書 V46</h2>
    <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px; margin-bottom:20px;">
        <p style="font-size:12px; margin:0;">🔑 步驟 1: 貼上 Gemini API 金鑰</p>
        <input type="text" id="api-key-input" placeholder="AIza 開頭的長字串..." style="width:100%; padding:12px; border-radius:8px; border:none; margin:10px 0; box-sizing:border-box;">
        <p style="font-size:10px; color:#aaa;">* 沒有金鑰將無法使用「完美辨識」功能</p>
    </div>
    <p style="font-size:12px; text-align:center;">步驟 2: 選擇魔法師進入遊戲</p>
    <button class="btn btn-outline" onclick="selectUser('小緁')">🪄 魔法師：小緁</button>
    <button class="btn btn-outline" onclick="selectUser('小鈞')">🪄 魔法師：小鈞</button>
    <button class="btn btn-outline" style="border-color:var(--m-gold); color:var(--m-gold) !important;" onclick="selectUser('小凱')">🛠️ 測試員：小凱</button>
</div>

<!-- 2. 圖鑑主頁 -->
<div id="page-home" class="page">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3 style="color: var(--m-gold); margin: 0;">📜 <span id="display-user"></span>的圖鑑</h3>
        <button onclick="location.reload()" style="background:none; border:1px solid #fff; color:white; padding:4px 8px; border-radius:5px; font-size:10px;">登出</button>
    </div>
    <div class="energy-bar">⚡ 今日領獎餘額：<span id="daily-energy">3 / 3</span></div>
    <div id="tome-grid" class="tome-grid"></div>
    <div style="margin-top: 15px;"><button class="btn btn-gold" onclick="showPage('page-mode-select')">⚔️ 開始試煉挑戰</button></div>
</div>

<!-- 3. 模式 -->
<div id="page-mode-select" class="page">
    <h2 style="text-align: center; color: var(--m-gold);">選擇模式</h2>
    <button class="btn btn-gold" style="padding:30px;" onclick="startGame('dictation')">🎧 聽寫測驗</button>
    <button class="btn btn-gold" style="padding:30px; margin-top:20px;" onclick="startGame('copying')">✍️ 照著寫測驗</button>
    <button class="btn btn-outline" style="margin-top:auto;" onclick="showPage('page-home')">返回</button>
</div>

<!-- 4. 拍照頁 -->
<div id="page-collect" class="page">
    <div style="display:flex; justify-content: space-between;"><span id="progress-label">1 / 10</span><button onclick="location.reload()">✕</button></div>
    <div class="magic-card" style="margin-top:10px;">
        <div id="ui-dictation" style="display:none;"><div style="font-size:70px; cursor:pointer;" onclick="speakCurrent()">🔊</div></div>
        <div id="ui-copying" style="display:none;"><div id="target-word" class="word-display">...</div></div>
    </div>
    <div style="position: relative; width: 100%; height: 260px; background: #000; border-radius: 20px; overflow: hidden; margin: 15px 0; border: 2px solid var(--m-blue);">
        <video id="video" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 90px; border: 3px solid var(--m-gold); border-radius: 10px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none;"></div>
    </div>
    <button class="btn btn-gold" onclick="snap()">🔮 鎖定並錄入符文</button>
    <button id="btn-next" class="btn btn-outline" style="margin-top:auto;" onclick="nextStep()">下一步</button>
</div>

<!-- 5. 鑑定室 -->
<div id="page-review" class="page">
    <h3 style="text-align: center; color: var(--m-gold);">🔍 雲端鑑定報告</h3>
    <div id="review-list" style="flex-grow: 1; overflow-y: auto;"></div>
    <button class="btn btn-gold" id="btn-ai-start" onclick="startAI()">🚀 啟動 Gemini 雲端鑑定</button>
    <button id="final-btn" class="btn btn-gold" style="display:none;" onclick="showPage('page-treasure')">🔓 結算成果</button>
</div>

<!-- 6. 藏寶室 -->
<div id="page-treasure" class="page">
    <h2 style="text-align: center; color: var(--m-gold);">🎁 藏寶室</h2>
    <div id="chest-zone" style="display: flex; justify-content: space-around; margin-top: 40px;">
        <div class="chest" style="font-size:60px; cursor:pointer;" onclick="openChest(this)">📦</div>
        <div class="chest" style="font-size:60px; cursor:pointer;" onclick="openChest(this)">📦</div>
        <div class="chest" style="font-size:60px; cursor:pointer;" onclick="openChest(this)">📦</div>
    </div>
    <div id="prize-reveal" style="display:none; text-align:center; margin-top:20px;"><h1 id="prize-name">...</h1><button class="btn btn-gold" onclick="location.reload()">返回大殿</button></div>
</div>

<canvas id="proc-canvas" style="display:none;"></canvas>

<script>
    const allSpells = [{n:"火球術",t:"fire"},{n:"冰晶陣",t:"ice"},{n:"雷神怒",t:"light"},{n:"風之翼",t:"wind"},{n:"地動波",t:"earth"},{n:"聖光盾",t:"shield"},{n:"炎爆術",t:"fire"},{n:"絕對零度",t:"ice"},{n:"連鎖閃電",t:"light"},{n:"萬象星隕",t:"fire"}];
    const wordsData = {
        "小鈞": ["畫畫", "送給", "一顆", "寫下", "祝福", "一張", "可愛", "笑臉", "感謝", "老師", "啊", "還要", "漂亮", "蛋糕"],
        "小緁": ["傘", "烏雲", "天色暗", "爺爺", "猜字", "謎語", "撐開", "屋頂", "柺杖", "滴滴答答", "叩", "嘻嘻哈哈", "落下來", "大街", "答案", "園丁", "公園", "每天", "認真", "比", "遊客", "相當", "高興", "拍照", "草皮", "摘花", "立布告牌", "各位", "重新", "它", "欣賞", "奇妙"],
        "小凱": ["測試", "成功"]
    };

    let currentUser="", currentMode="", mySpells=[], usedWords=[], challenges=[], workbook=[], currentIdx=0, maxChallenges=10, stream=null;

    // --- 基礎控制 ---
    window.onload = () => {
        const k = localStorage.getItem('gemini_api_key');
        if(k) document.getElementById('api-key-input').value = k;
    };

    window.showPage = id => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'page-home') renderHome();
    };

    window.selectUser = name => {
        const key = document.getElementById('api-key-input').value.trim();
        if(key) localStorage.setItem('gemini_api_key', key);
        
        currentUser = name;
        maxChallenges = (name === '小凱') ? 2 : 10;
        document.getElementById('display-user').innerText = name;
        
        mySpells = JSON.parse(localStorage.getItem('m_mine_'+name)) || [];
        usedWords = JSON.parse(localStorage.getItem('m_used_'+name)) || [];
        
        window.showPage('page-home');
    };

    window.renderHome = () => {
        const grid = document.getElementById('tome-grid'); grid.innerHTML = '';
        allSpells.forEach(s => {
            const has = mySpells.some(m => m.n === s.n);
            const div = document.createElement('div');
            div.className = 'scroll-icon';
            div.style.opacity = has ? "1" : "0.2";
            div.innerHTML = `📜<br>${s.n}`;
            grid.appendChild(div);
        });
        const stats = getStats();
        document.getElementById('daily-energy').innerText = (3 - stats.count) + " / 3";
    };

    // --- 遊戲邏輯 (修正題目不顯示問題) ---
    window.startGame = mode => {
        currentMode = mode;
        const pool = wordsData[currentUser] || ["錯誤", "重新登入"];
        
        // 隨機選題邏輯
        let avail = pool.filter(w => !usedWords.includes(w));
        if (avail.length < maxChallenges) { usedWords = []; avail = pool; }
        
        challenges = avail.sort(() => 0.5 - Math.random()).slice(0, maxChallenges);
        usedWords = [...usedWords, ...challenges];
        localStorage.setItem('m_used_'+currentUser, JSON.stringify(usedWords));
        
        workbook = []; currentIdx = 0;
        window.showPage('page-collect');
        startCam();
        updateUI();
    };

    function updateUI() {
        document.getElementById('progress-label').innerText = `${currentIdx+1} / ${maxChallenges}`;
        document.getElementById('target-word').innerText = challenges[currentIdx];
        
        document.getElementById('ui-dictation').style.display = (currentMode==='dictation'?'block':'none');
        document.getElementById('ui-copying').style.display = (currentMode==='copying'?'block':'none');
        
        if(currentMode==='dictation') setTimeout(() => window.speakWord(challenges[currentIdx]), 500);
    }

    window.snap = () => {
        const v = document.getElementById('video'), c = document.getElementById('proc-canvas'), ctx = c.getContext('2d');
        c.width = 600; c.height = 200;
        ctx.drawImage(v, (v.videoWidth - 800)/2, (v.videoHeight - 300)/2, 800, 300, 0, 0, 600, 200);
        const data = c.toDataURL('image/jpeg', 0.8);
        workbook[currentIdx] = { word: challenges[currentIdx], photo: data, status: null };
        alert("✨ 符文已記錄");
    };

    window.nextStep = () => {
        if(!workbook[currentIdx]) return alert("請先拍照");
        if(currentIdx < maxChallenges - 1) { currentIdx++; updateUI(); }
        else { stopCam(); window.showPage('page-review'); renderReview(); }
    };

    // --- AI 鑑定 (Gemini 核心) ---
    window.startAI = async () => {
        const key = localStorage.getItem('gemini_api_key');
        if(!key) return alert("請回首頁填寫 API Key 才能連線雲端大腦！");
        
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('btn-ai-start').style.display = 'none';

        try {
            for(let i=0; i<workbook.length; i++) {
                document.getElementById('progress-fill').style.width = ((i+1)/workbook.length*100)+'%';
                
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;
                const payload = { contents: [{ parts: [{ text: `辨識手寫字「${workbook[i].word}」。正確回傳「正確」，錯誤回傳看到的字。` }, { inline_data: { mime_type: "image/jpeg", data: workbook[i].photo.split(',')[1] } }] }] };
                
                const res = await fetch(url, { method: "POST", body: JSON.stringify(payload) });
                const json = await res.json();
                const txt = json.candidates[0].content.parts[0].text.trim();
                
                workbook[i].detectedText = txt;
                workbook[i].status = txt.includes("正確") || txt.includes(workbook[i].word);
                renderReview();
            }
        } catch (e) { alert("連線失敗，請檢查金鑰是否有誤。"); }
        document.getElementById('loader').style.display = 'none';
    };

    function renderReview() {
        const list = document.getElementById('review-list'); list.innerHTML = '';
        workbook.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'review-item';
            div.innerHTML = `<img src="${item.photo}" class="preview-img"><div style="flex:1;margin-left:10px;"><b>目標：${item.word}</b><br><small>AI讀取：${item.detectedText||'等待中'}</small><br><button onclick="manual(${i})">${item.status?'✅ 取消':'❌ 通過'}</button></div>`;
            list.appendChild(div);
        });
        document.getElementById('final-btn').style.display = workbook.every(i=>i.status!==null) ? 'block' : 'none';
    }

    window.manual = i => { workbook[i].status = !workbook[i].status; renderReview(); };
    async function startCam(){ stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:1280}}); document.getElementById('video').srcObject=stream; }
    function stopCam(){ if(stream) stream.getTracks().forEach(t=>t.stop()); }
    window.speakWord = t => { const m = new SpeechSynthesisUtterance(t); m.lang='zh-TW'; speechSynthesis.speak(m); };
    window.openChest = el => { confetti(); alert("獲得隨機咒語！"); location.reload(); };
    function getStats(){ const today = new Date().toLocaleDateString(); const key='m_daily_'+currentUser; let s = JSON.parse(localStorage.getItem(key)) || {date:today, count:0}; if(s.date!==today) s={date:today, count:0}; return s; }
</script>
</body>
</html>

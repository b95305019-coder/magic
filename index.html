<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>魔法大師 V44 - 金鑰修正版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --m-purple: #1A1A2E; --m-gold: #FFD700; --m-blue: #00D2FF; --m-red: #FF3B30; --m-parchment: #fdf5e6; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--m-purple); color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .page { display: none; padding: 20px; box-sizing: border-box; min-height: 100dvh; flex-direction: column; }
        .page.active { display: flex; }
        .wizard-icon { font-size: 60px; text-align: center; margin: 10px 0; animation: float 3s infinite; }
        .magic-card { background: var(--m-parchment); color: #333; border-radius: 20px; padding: 20px; text-align: center; border: 4px solid var(--m-blue); }
        .btn { padding: 15px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin: 5px 0; width: 100%; text-align: center; display: block; }
        .btn-gold { background: linear-gradient(45deg, var(--m-gold), #FFA500); color: black !important; }
        .btn-outline { background: transparent; border: 2px solid var(--m-blue); color: white !important; }
        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .tome-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow-y: auto; flex-grow: 1; padding: 10px; }
        .scroll-icon { background: rgba(255,255,255,0.08); border: 1px solid var(--m-gold); border-radius: 10px; padding: 5px; text-align: center; font-size: 9px; min-height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div style="border: 4px solid #333; border-top: 4px solid var(--m-gold); width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="margin-top:20px; color:var(--m-gold);">正在連線鑑定...</p>
</div>

<!-- 登入頁 -->
<div id="page-intro" class="page active">
    <div class="wizard-icon">🧙‍♂️</div>
    <h2 style="text-align: center; color: var(--m-gold); margin: 0;">真理之書 V44</h2>
    <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px; margin:20px 0;">
        <p style="font-size:12px; margin:0 0 5px 0;">🔑 請使用 Copy 按鈕複製金鑰並貼上：</p>
        <input type="text" id="api-key-input" placeholder="貼上 AIza 開頭的金鑰..." style="width:100%; padding:15px; border-radius:8px; border:none; box-sizing:border-box; font-size:16px;">
    </div>
    <div class="btn btn-gold" onclick="window.saveKey()">💾 儲存金鑰並進入</div>
    <p id="key-msg" style="text-align:center; font-size:12px; color:var(--m-gold);"></p>
</div>

<!-- 下方省略部分重複的 HTML 結構，確保 selectUser 與 startGame 邏輯正確 -->
<div id="page-user-select" class="page">
    <h2 style="text-align: center; color: var(--m-gold);">選擇魔法師</h2>
    <div class="btn btn-outline" onclick="window.selectUser('小緁')">🪄 魔法師：小緁</div>
    <div class="btn btn-outline" onclick="window.selectUser('小鈞')">🪄 魔法師：小鈞</div>
    <div class="btn btn-outline" style="border-color: var(--m-gold);" onclick="window.selectUser('小凱')">🛠️ 測試員：小凱</div>
</div>

<!-- 此處其餘頁面邏輯保持 V43 結構，重點在下面的 script -->
<script>
    // 預設資料
    const allSpells = [{n:"火球術",t:"fire"},{n:"冰晶陣",t:"ice"},{n:"雷神怒",t:"light"},{n:"風之翼",t:"wind"},{n:"地動波",t:"earth"},{n:"聖光盾",t:"shield"}];
    const wordsData = { "小鈞": ["畫畫", "祝福", "漂亮"], "小緁": ["烏雲", "謎語", "答案"], "小凱": ["測試", "成功"] };

    let currentUser="", currentMode="", mySpells=[], usedWords=[], currentIdx=0, workbook=[];

    // 1. 強化的儲存金鑰功能
    window.saveKey = function() {
        const key = document.getElementById('api-key-input').value.trim();
        if(!key || !key.startsWith("AIza")) {
            alert("錯誤：金鑰格式不正確！必須以 AIza 開頭。請點擊 Google 頁面的 Copy Key 按鈕。");
            return;
        }
        localStorage.setItem('gemini_api_key', key);
        window.showPage('page-user-select');
    };

    window.selectUser = name => {
        currentUser = name;
        mySpells = JSON.parse(localStorage.getItem('m_mine_'+name)) || [];
        window.showPage('page-home');
        document.getElementById('display-user').innerText = name;
    };

    window.showPage = id => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    // 其他原本的 startGame, snap符文, startGeminiAI 邏輯在此繼續...
    // (由於字數限制，請確保在您的 index.html 檔案中保留 V43 的相機與遊戲函數)
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>魔法大師：十階試煉版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --m-purple: #1A1A2E; --m-gold: #FFD700; --m-blue: #00D2FF; --m-deep: #16213E; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; background: var(--m-purple); color: white; overflow-x: hidden; }
        .page { display: none; padding: 20px; box-sizing: border-box; min-height: 100dvh; flex-direction: column; }
        .page.active { display: flex; }

        /* 介面組件 */
        .wizard-icon { font-size: 70px; text-align: center; margin: 10px 0; filter: drop-shadow(0 0 15px var(--m-blue)); animation: float 3s ease-in-out infinite; }
        .story-card { background: rgba(255,255,255,0.05); border: 2px solid var(--m-gold); border-radius: 20px; padding: 20px; line-height: 1.6; margin-bottom: 20px; font-size: 14px; }
        .energy-bar { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 15px; margin: 10px 0; font-size: 14px; border-left: 5px solid var(--m-gold); }

        /* 試煉卡片 */
        .magic-card { background: #fdf5e6; color: #333; border-radius: 20px; padding: 30px 10px; text-align: center; border: 5px solid var(--m-blue); box-shadow: 0 0 20px var(--m-blue); }
        .target-word { font-size: 70px; font-weight: 900; letter-spacing: 10px; color: #222; margin: 10px 0; }

        /* 圖鑑 */
        .tome-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; overflow-y: auto; max-height: 35vh; padding: 5px; }
        .scroll-icon { background: rgba(255,255,255,0.05); border: 1px solid var(--m-gold); border-radius: 8px; padding: 5px 2px; text-align: center; font-size: 9px; min-height: 55px; display: flex; flex-direction: column; justify-content: center; }
        
        /* 寶箱 */
        .chest-container { display: flex; justify-content: space-around; align-items: center; margin-top: 40px; flex-grow: 1; }
        .chest { font-size: 60px; cursor: pointer; transition: 0.3s; }
        .chest.shake { animation: shake 0.6s infinite; }

        .btn { padding: 15px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin: 5px 0; width: 100%; }
        .btn-gold { background: linear-gradient(45deg, var(--m-gold), #FFA500); color: black; }
        .btn-outline { background: transparent; border: 1px solid white; color: white; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(5deg); } 75% { transform: rotate(-5deg); } }
        @keyframes openChest { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }

        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .review-list { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .review-item { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .preview-img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div style="border: 4px solid #333; border-top: 4px solid var(--m-gold); width: 40px; height: 40px; border-radius: 50%; animation: shake 1s infinite;"></div>
    <p style="margin-top:15px; color:var(--m-gold);">正在鑑定十階符文...</p>
</div>

<!-- 角色選擇 -->
<div id="page-intro" class="page active">
    <div class="wizard-icon">🧙‍♂️</div>
    <h2 style="text-align: center; color: var(--m-gold); margin: 0;">真理之書：十階試煉</h2>
    <div class="story-card">
        奧利安大師：「現在試煉變得更嚴苛了。你必須連續完成十道符文，且正確率需達 80% 以上，封印的寶箱才會顯現出真正的魔法卷軸。」
    </div>
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <button class="btn btn-outline" style="border-color: var(--m-blue); font-size: 22px;" onclick="selectUser('小緁')">🪄 魔法師：小緁</button>
        <button class="btn btn-outline" style="border-color: var(--m-blue); font-size: 22px;" onclick="selectUser('小鈞')">🪄 魔法師：小鈞</button>
    </div>
</div>

<!-- 主頁面 -->
<div id="page-home" class="page">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3 style="color: var(--m-gold); margin: 0;">📜 <span id="display-user"></span>的真理之書</h3>
        <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:2px 8px; font-size:11px;">登出</button>
    </div>
    
    <div class="energy-bar">
        ⚡ 今日剩餘法力：<span id="daily-energy" style="font-weight:bold; color:var(--m-gold);">3 / 3</span> 次領獎機會
    </div>

    <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; flex-grow: 1;">
        <div id="tome-grid" class="tome-grid"></div>
    </div>
    <div style="margin-top: 10px;">
        <button id="start-btn" class="btn btn-gold" onclick="startGame()">⚔️ 開始十階試煉</button>
        <button class="btn btn-outline" onclick="showPage('page-manage')" style="font-size:12px; padding:8px;">⚙️ 管理我的題庫</button>
    </div>
</div>

<!-- 拍照試煉 -->
<div id="page-collect" class="page">
    <div style="display:flex; justify-content: space-between;">
        <span id="progress" style="color:var(--m-gold); font-weight:bold;">試煉 1 / 10</span>
        <button onclick="location.reload()" style="background:none; color:white; border:none; font-size:20px;">✕</button>
    </div>
    <div class="magic-card" style="margin-top:15px;">
        <div class="target-word" id="target-word">...</div>
    </div>
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">
    <button class="btn btn-gold" style="margin-top:20px;" onclick="document.getElementById('camera-input').click()">📸 拍下符文</button>
    <div id="preview-box" style="display:none; text-align:center; margin-top:5px;">
        <img id="capture-preview" style="width:100px; border:2px solid var(--m-blue); border-radius:10px;">
        <p style="color:var(--m-blue); font-size:12px;">✨ 已記錄</p>
    </div>
    <button id="btn-next" class="btn btn-gold" style="margin-top:auto;" onclick="nextStep()">下一步</button>
</div>

<!-- 批改頁面 -->
<div id="page-review" class="page">
    <h3 style="text-align: center; color: var(--m-gold);">🔍 十階符文鑑定中</h3>
    <div id="review-list" class="review-list"></div>
    <button class="btn btn-gold" onclick="startAI()">🔮 AI 鑑定全部</button>
    <button id="final-btn" class="btn btn-gold" onclick="finishReview()">🔓 結算成果</button>
</div>

<!-- 三寶箱抽獎 -->
<div id="page-treasure" class="page">
    <h2 style="text-align: center; color: var(--m-gold);">🎁 藏寶室</h2>
    <p id="treasure-hint" style="text-align: center;"></p>
    <div class="chest-container">
        <div class="chest shake" onclick="openChest(this)">📦</div>
        <div class="chest shake" onclick="openChest(this)">📦</div>
        <div class="chest shake" onclick="openChest(this)">📦</div>
    </div>
    <div id="prize-reveal" style="display:none; text-align:center; margin-top:20px;">
        <h1 id="prize-name" style="color:var(--m-gold);">...</h1>
        <p id="prize-sub"></p>
        <button class="btn btn-gold" onclick="showPage('page-home')">回大殿</button>
    </div>
</div>

<!-- 管理面 -->
<div id="page-manage" class="page">
    <h3>⚙️ 題庫設定</h3>
    <div class="story-card">
        <p>匯入專屬生字 (CSV)：</p>
        <input type="file" accept=".csv" onchange="importCSV(this)">
    </div>
    <button class="btn btn-gold" style="margin-top:auto;" onclick="showPage('page-home')">返回</button>
</div>

<script>
    const defaultSpells = [
        {n: "火球術", t: "fire"}, {n: "冰晶陣", t: "ice"}, {n: "雷神怒", t: "light"}, {n: "風之翼", t: "wind"}, {n: "地動波", t: "earth"}, {n: "聖光盾", t: "shield"},
        {n: "炎爆術", t: "fire"}, {n: "紅蓮業火", t: "fire"}, {n: "太陽射線", t: "fire"}, {n: "餘燼之握", t: "fire"}, {n: "絕對零度", t: "ice"}, {n: "極地風暴", t: "ice"},
        {n: "連鎖閃電", t: "light"}, {n: "天罰之雷", t: "light"}, {n: "暴風之眼", t: "wind"}, {n: "石化術", t: "earth"}, {n: "崩山裂地", t: "earth"}, {n: "萬象星隕", t: "fire"}
        // 此處縮減演示，實際運作會支持50個
    ];

    const defaultWords = ["春天", "夏天", "秋天", "冬天", "森林", "大象", "太陽", "月亮", "星星", "海洋", "蝴蝶", "雲朵", "小草", "大樹", "花朵"];

    let currentUser = "";
    let wordPool = [], mySpells = [], usedWords = [];
    let challenges = [], currentIdx = 0, workbook = [];

    // --- 每日限額與題目追蹤邏輯 ---
    function getDailyStats() {
        const today = new Date().toLocaleDateString();
        const key = 'm_daily_' + currentUser;
        let stats = JSON.parse(localStorage.getItem(key)) || { date: today, count: 0 };
        if (stats.date !== today) stats = { date: today, count: 0 };
        return stats;
    }

    function selectUser(name) {
        currentUser = name;
        document.getElementById('display-user').innerText = name;
        mySpells = JSON.parse(localStorage.getItem('m_mine_' + currentUser)) || [];
        wordPool = JSON.parse(localStorage.getItem('m_words_' + currentUser)) || defaultWords;
        usedWords = JSON.parse(localStorage.getItem('m_used_' + currentUser)) || [];
        showPage('page-home');
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        if(p === 'page-home') renderHome();
    }

    function renderHome() {
        const grid = document.getElementById('tome-grid');
        grid.innerHTML = '';
        defaultSpells.forEach(spell => {
            const has = mySpells.find(s => s.n === spell.n);
            const div = document.createElement('div');
            div.className = 'scroll-icon';
            div.style.opacity = has ? "1" : "0.2";
            div.innerHTML = `📜<br>${spell.n}`;
            grid.appendChild(div);
        });
        const stats = getDailyStats();
        document.getElementById('daily-energy').innerText = `${3 - stats.count} / 3`;
        document.getElementById('start-btn').disabled = (stats.count >= 3);
        if(stats.count >= 3) document.getElementById('start-btn').innerText = "今日魔力已盡";
    }

    // --- 出題邏輯：優先抽未出過的題目 ---
    function pickTenWords() {
        let pool = [...wordPool];
        let available = pool.filter(w => !usedWords.includes(w));
        
        // 如果未出過的題目少於10題，清空紀錄重來
        if (available.length < 10) {
            usedWords = [];
            localStorage.setItem('m_used_' + currentUser, "[]");
            available = pool;
        }

        // 隨機選10題
        let chosen = available.sort(() => 0.5 - Math.random()).slice(0, 10);
        
        // 紀錄為已出過
        usedWords = [...usedWords, ...chosen];
        localStorage.setItem('m_used_' + currentUser, JSON.stringify(usedWords));
        return chosen;
    }

    function startGame() {
        if(wordPool.length < 10) return alert("題庫至少需要10題喔！");
        challenges = pickTenWords();
        currentIdx = 0; workbook = [];
        showPage('page-collect');
        updateUI();
    }

    // --- 試煉流程 ---
    document.getElementById('camera-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            workbook[currentIdx] = { word: challenges[currentIdx], photo: ev.target.result, status: null };
            document.getElementById('capture-preview').src = ev.target.result;
            document.getElementById('preview-box').style.display = 'block';
        };
        reader.readAsDataURL(file);
    });

    function updateUI() {
        document.getElementById('progress').innerText = `試煉 ${currentIdx+1} / 10`;
        document.getElementById('target-word').innerText = challenges[currentIdx];
        document.getElementById('preview-box').style.display = workbook[currentIdx] ? 'block' : 'none';
        if(workbook[currentIdx]) document.getElementById('capture-preview').src = workbook[currentIdx].photo;
        document.getElementById('btn-next').innerText = (currentIdx === 9) ? "完成所有拍照" : "下一題";
    }

    function nextStep() {
        if(!workbook[currentIdx]) return alert("請拍下這道符文");
        if(currentIdx < 9) { currentIdx++; updateUI(); }
        else { showPage('page-review'); renderReview(); }
    }

    function renderReview() {
        const list = document.getElementById('review-list');
        list.innerHTML = '';
        workbook.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'review-item';
            let icon = item.status === true ? '✅' : (item.status === false ? '❌' : '⏳');
            div.innerHTML = `<img src="${item.photo}" class="preview-img"><div style="flex:1; font-size:12px;"><b>${item.word}</b><br><button onclick="manual(${i})" style="font-size:10px; background:gray; color:white; border:none;">手動通過</button></div><div style="font-size:20px">${icon}</div>`;
            list.appendChild(div);
        });
    }

    function manual(i) { workbook[i].status = true; renderReview(); }

    async function startAI() {
        document.getElementById('loader').style.display = 'flex';
        const worker = await Tesseract.createWorker('chi_tra');
        for(let i=0; i<workbook.length; i++){
            const res = await worker.recognize(workbook[i].photo);
            workbook[i].status = res.data.text.replace(/\s/g, '').includes(workbook[i].word);
            renderReview();
        }
        await worker.terminate();
        document.getElementById('loader').style.display = 'none';
    }

    function finishReview() {
        const score = workbook.filter(i => i.status === true).length;
        if(confirm(`結算試煉：正確率為 ${score} / 10。確定要領取寶箱嗎？`)) {
            document.getElementById('treasure-hint').innerText = `你的試煉成果：${score} 分`;
            showPage('page-treasure');
        }
    }

    // --- 獎勵邏輯 ---
    function openChest(el) {
        document.querySelectorAll('.chest').forEach(c => c.onclick = null);
        el.style.animation = "shake 0.5s 2";
        
        const score = workbook.filter(i => i.status === true).length;
        
        setTimeout(() => {
            el.style.display = "none";
            document.querySelectorAll('.chest').forEach(c => c.style.opacity = "0");
            
            const reveal = document.getElementById('prize-reveal');
            const name = document.getElementById('prize-name');
            const sub = document.getElementById('prize-sub');
            reveal.style.display = "block";

            if (score >= 8) {
                // 正確率達標
                const ungot = defaultSpells.filter(s => !mySpells.some(m => m.n === s.n));
                const prize = ungot.length > 0 ? ungot[Math.floor(Math.random()*ungot.length)] : defaultSpells[0];
                
                mySpells.push(prize);
                localStorage.setItem('m_mine_' + currentUser, JSON.stringify(mySpells));
                
                const stats = getDailyStats();
                stats.count += 1;
                localStorage.setItem('m_daily_' + currentUser, JSON.stringify(stats));

                confetti({ particleCount: 150, spread: 70 });
                name.innerText = `【${prize.n}】`;
                sub.innerText = "🎉 試煉成功！新卷軸已歸你所有！";
            } else {
                // 不及格
                name.innerText = "實力不足";
                sub.innerText = "❌ 奧利安：再多加修煉，下次再來挑戰吧！";
            }
        }, 1200);
    }

    function importCSV(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split(/\r?\n/);
            wordPool = lines.map(l => l.trim()).filter(l => l);
            localStorage.setItem('m_words_' + currentUser, JSON.stringify(wordPool));
            alert("題庫匯入成功！");
        };
        reader.readAsText(input.files[0]);
    }

    function exportCSV(type) {
        const data = (type === 'word') ? wordPool.join("\n") : "";
        const blob = new Blob([data], {type: 'text/csv'});
        window.open(URL.createObjectURL(blob));
    }
</script>
</body>
</html>

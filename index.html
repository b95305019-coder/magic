<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>魔法大師 V25 - 符文鎖定版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --m-purple: #1A1A2E; --m-gold: #FFD700; --m-blue: #00D2FF; --m-deep: #16213E; --m-red: #FF3B30; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; background: var(--m-purple); color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .page { display: none; padding: 20px; box-sizing: border-box; min-height: 100dvh; flex-direction: column; }
        .page.active { display: flex; }

        /* 介面組件 */
        .wizard-icon { font-size: 70px; text-align: center; margin: 10px 0; filter: drop-shadow(0 0 15px var(--m-blue)); animation: float 3s ease-in-out infinite; }
        .energy-bar { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 15px; margin: 10px 0; font-size: 14px; border-left: 5px solid var(--m-gold); }
        .magic-card { background: #fdf5e6; color: #333; border-radius: 20px; padding: 20px; text-align: center; border: 5px solid var(--m-blue); box-shadow: 0 0 20px var(--m-blue); }
        .target-word { font-size: 60px; font-weight: 900; letter-spacing: 8px; color: #222; margin: 10px 0; }
        .tome-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; overflow-y: auto; max-height: 35vh; padding: 5px; }
        .scroll-icon { background: rgba(255,255,255,0.05); border: 1px solid var(--m-gold); border-radius: 8px; padding: 8px 2px; text-align: center; font-size: 9px; min-height: 55px; display: flex; flex-direction: column; justify-content: center; }
        
        /* 核心：即時相機與瞄準框 */
        .camera-container {
            position: relative; width: 100%; height: 300px; 
            background: #000; border-radius: 20px; overflow: hidden; margin-top: 15px;
            border: 2px solid var(--m-blue);
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .viewfinder {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 120px;
            border: 3px solid var(--m-gold); border-radius: 10px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); /* 遮罩四周 */
            pointer-events: none; z-index: 10;
        }
        .viewfinder::after {
            content: "將符文置於框內"; position: absolute; bottom: -25px; left: 50%;
            transform: translateX(-50%); color: var(--m-gold); font-size: 12px; white-space: nowrap;
        }

        .btn { padding: 15px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin: 5px 0; width: 100%; text-align: center; display: block; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(45deg, var(--m-gold), #FFA500); color: black; }
        .btn-outline { background: transparent; border: 2px solid var(--m-blue); color: white; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        /* 鑑定室 */
        .review-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .preview-img { width: 80px; height: 50px; object-fit: contain; background: #fff; border-radius: 5px; border: 1px solid var(--m-gold); cursor: zoom-in; }
        
        /* 放大燈箱 */
        .photo-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 6000; display: none; align-items: center; justify-content: center; }
        .photo-modal img { max-width: 95%; max-height: 80%; border: 2px solid white; }
    </style>
</head>
<body>

<div id="photo-modal" class="photo-modal" onclick="closeZoom()"><img id="zoomed-image" src=""></div>

<div id="loader" class="loader">
    <div style="border: 4px solid #333; border-top: 4px solid var(--m-gold); width: 40px; height: 40px; border-radius: 50%; animation: rotate 1s linear infinite;"></div>
    <p id="loader-text" style="margin-top:15px; color:var(--m-gold);">正在用魔力鑑定...</p>
    <div style="width:80%; height:10px; background:#333; border-radius:5px; margin-top:10px; overflow:hidden; border:1px solid var(--m-gold);">
        <div id="progress-fill" style="width:0%; height:100%; background:var(--m-gold); transition:0.3s;"></div>
    </div>
</div>

<div id="page-intro" class="page active">
    <div class="wizard-icon">🧙‍♂️</div>
    <h2 style="text-align: center; color: var(--m-gold);">真理之書：符文鎖定</h2>
    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
        <div class="btn btn-outline" onclick="selectUser('小緁')">🪄 魔法師：小緁</div>
        <div class="btn btn-outline" onclick="selectUser('小鈞')">🪄 魔法師：小鈞</div>
        <div class="btn btn-outline" style="border-color: var(--m-gold); color: var(--m-gold);" onclick="selectUser('小凱')">🛠️ 測試員：小凱</div>
    </div>
</div>

<div id="page-home" class="page">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3 style="color: var(--m-gold); margin: 0;">📜 <span id="display-user"></span>的圖鑑</h3>
        <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:2px 8px; font-size:11px;">登出</button>
    </div>
    <div class="energy-bar">⚡ 今日剩餘領獎：<span id="daily-energy">3 / 3</span></div>
    <div id="tome-grid" class="tome-grid"></div>
    <div style="margin-top: auto;"><button id="start-btn" class="btn btn-gold" onclick="startGame()">⚔️ 開始試煉</button></div>
</div>

<div id="page-collect" class="page">
    <div style="display:flex; justify-content: space-between;">
        <span id="progress-label" style="color:var(--m-gold); font-weight:bold;">1 / 10</span>
        <button onclick="stopCameraAndHome()" style="background:none; color:white; border:none;">✕</button>
    </div>
    <div class="magic-card"><div class="target-word" id="target-word">...</div></div>
    
    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <div class="viewfinder"></div>
    </div>
    
    <button class="btn btn-gold" style="margin-top:20px;" onclick="snap符文()">🔮 鎖定並捕獲符文</button>
    
    <div id="preview-box" style="display:none; text-align:center; margin-top:5px;">
        <img id="capture-preview" style="width:120px; border:2px solid var(--m-blue); border-radius:5px;">
        <p style="color:var(--m-blue); font-size:12px;">✅ 符文已鎖定</p>
    </div>
    <button id="btn-next" class="btn btn-outline" style="margin-top:auto;" onclick="nextStep()">下一步</button>
</div>

<div id="page-review" class="page">
    <h3 style="text-align: center; color: var(--m-gold);">🔍 鑑定中心</h3>
    <div id="review-list" class="review-list"></div>
    <button class="btn btn-gold" id="btn-ai-start" onclick="startAI()">🚀 啟動 AI 鑑定</button>
    <button id="final-btn" class="btn btn-gold" style="display:none;" onclick="finishReview()">🔓 結算成果</button>
</div>

<div id="page-treasure" class="page">
    <h2 style="text-align: center; color: var(--m-gold);">🎁 藏寶室</h2>
    <div class="chest-container">
        <div class="chest shake" onclick="openChest(this)">📦</div>
        <div class="chest shake" onclick="openChest(this)">📦</div>
        <div class="chest shake" onclick="openChest(this)">📦</div>
    </div>
    <div id="prize-reveal" style="display:none; text-align:center; margin-top:20px;">
        <h1 id="prize-name" style="color:var(--m-gold);">...</h1>
        <button class="btn btn-gold" onclick="showPage('page-home')">返回圖鑑</button>
    </div>
</div>

<canvas id="proc-canvas" style="display:none;"></canvas>

<script>
    const defaultSpells = [
        {n: "火球術", t: "fire"}, {n: "冰晶陣", t: "ice"}, {n: "雷神怒", t: "light"}, {n: "風之翼", t: "wind"}, {n: "地動波", t: "earth"}, {n: "聖光盾", t: "shield"},
        {n: "炎爆術", t: "fire"}, {n: "絕對零度", t: "ice"}, {n: "連鎖閃電", t: "light"}, {n: "疾風步", t: "wind"}, {n: "崩山裂地", t: "earth"}, {n: "淨化之光", t: "light"}
    ];
    const officialWords = {
        "小鈞": ["畫畫", "送給", "一顆", "寫下", "祝福", "一張", "可愛", "笑臉", "感謝", "老師", "啊", "還要", "漂亮", "蛋糕"],
        "小緁": ["傘", "烏雲", "天色暗", "爺爺", "猜字", "謎語", "撐開", "屋頂", "柺杖", "滴滴答答", "叩", "嘻嘻哈哈", "落下來", "大街", "答案", "園丁", "公園", "每天", "認真", "比", "遊客", "相當", "高興", "拍照", "草皮", "摘花", "立布告牌", "各位", "重新", "它", "欣賞", "奇妙"],
        "小凱": ["測試", "符文", "力量"]
    };

    let currentUser = "", wordPool = [], mySpells = [], usedWords = [];
    let challenges = [], currentIdx = 0, workbook = [], maxChallenges = 10;
    let stream = null;

    // --- 核心：相機控制與方框裁剪 ---
    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            document.getElementById('video').srcObject = stream;
        } catch (e) { alert("無法開啟相機，請確保網址為 HTTPS 並允許相機權限。"); }
    }

    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
    }

    window.snap符文 = function() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('proc-canvas');
        const ctx = canvas.getContext('2d');

        // 計算裁剪區域 (方框在視訊中的相對位置)
        // 假設 video 在 container 中 object-fit: cover
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        
        // 鎖定中間 80% 寬度, 120px 比例的高度
        const cropW = vw * 0.8;
        const cropH = vh * 0.3; // 抓取中央較窄的橫條
        const startX = (vw - cropW) / 2;
        const startY = (vh - cropH) / 2;

        canvas.width = cropW;
        canvas.height = cropH;

        ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, cropW, cropH);
        
        const photoData = canvas.toDataURL('image/jpeg', 0.9);
        workbook[currentIdx] = { word: challenges[currentIdx], rawPhoto: photoData, status: null };
        
        document.getElementById('capture-preview').src = photoData;
        document.getElementById('preview-box').style.display = 'block';
    };

    // --- 其他邏輯保持優化 ---
    window.selectUser = function(name) {
        currentUser = name;
        maxChallenges = (name === '小凱') ? 2 : 10;
        document.getElementById('display-user').innerText = name;
        mySpells = JSON.parse(localStorage.getItem('m_mine_' + currentUser)) || [];
        wordPool = officialWords[currentUser] || [];
        usedWords = JSON.parse(localStorage.getItem('m_used_' + currentUser)) || [];
        showPage('page-home');
    };

    window.showPage = function(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'page-home') renderHome();
    };

    window.renderHome = function() {
        const grid = document.getElementById('tome-grid'); grid.innerHTML = '';
        defaultSpells.forEach(s => {
            const has = mySpells.find(m => m.n === s.n);
            const div = document.createElement('div');
            div.className = 'scroll-icon'; div.style.opacity = has ? "1" : "0.2";
            div.innerHTML = `📜<br>${s.n}`; grid.appendChild(div);
        });
        const stats = getDailyStats();
        document.getElementById('daily-energy').innerText = (3 - stats.count) + " / 3";
        const btn = document.getElementById('start-btn');
        btn.disabled = (stats.count >= 3);
        btn.innerText = (stats.count >= 3) ? "魔力耗盡" : `⚔️ 開始 ${maxChallenges} 階試煉`;
    };

    window.startGame = function() {
        let pool = [...wordPool];
        let avail = pool.filter(w => !usedWords.includes(w));
        if (avail.length < maxChallenges) { usedWords = []; avail = pool; }
        challenges = avail.sort(() => 0.5 - Math.random()).slice(0, maxChallenges);
        usedWords = [...usedWords, ...challenges];
        localStorage.setItem('m_used_' + currentUser, JSON.stringify(usedWords));
        currentIdx = 0; workbook = [];
        showPage('page-collect');
        startCamera();
        updateUI();
    };

    function updateUI() {
        document.getElementById('progress-label').innerText = `${currentIdx+1} / ${maxChallenges}`;
        document.getElementById('target-word').innerText = challenges[currentIdx];
        document.getElementById('preview-box').style.display = 'none';
        document.getElementById('btn-next').innerText = (currentIdx === maxChallenges - 1) ? "錄入完成" : "下一題";
    }

    window.nextStep = function() {
        if(!workbook[currentIdx]) return alert("請先鎖定符文");
        if(currentIdx < maxChallenges - 1) { currentIdx++; updateUI(); }
        else { stopCamera(); showPage('page-review'); renderReview(); }
    };

    window.renderReview = function() {
        const list = document.getElementById('review-list'); list.innerHTML = '';
        workbook.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'review-item';
            let icon = item.status === true ? '✅' : (item.status === false ? '❌' : '⏳');
            let btn = item.status === true ? `<button onclick="cancelManual(${i})" class="btn-mini" style="background:var(--m-red)">取消</button>` : `<button onclick="manual(${i})" class="btn-mini" style="background:#555">通過</button>`;
            div.innerHTML = `<img src="${item.rawPhoto}" class="preview-img" onclick="openZoom('${item.rawPhoto}')"><div style="flex:1; font-size:12px;"><b>${item.word}</b><br>${btn}</div><div style="font-size:20px">${icon}</div>`;
            list.appendChild(div);
        });
        document.getElementById('final-btn').style.display = workbook.every(i => i.status !== null) ? 'block' : 'none';
    };

    window.manual = function(i) { workbook[i].status = true; renderReview(); };
    window.cancelManual = function(i) { workbook[i].status = false; renderReview(); };

    window.startAI = async function() {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        document.getElementById('btn-ai-start').style.display = 'none';
        try {
            const worker = await Tesseract.createWorker('chi_tra');
            for(let i=0; i<workbook.length; i++){
                document.getElementById('progress-fill').style.width = ((i+1)/workbook.length*100)+'%';
                const res = await worker.recognize(workbook[i].rawPhoto);
                const txt = res.data.text.replace(/\s/g, '');
                let match = txt.includes(workbook[i].word);
                if(!match){
                    let c = 0; for(let char of workbook[i].word) if(txt.includes(char)) c++;
                    match = (c/workbook[i].word.length) >= 0.6;
                }
                workbook[i].status = match;
                renderReview();
            }
            await worker.terminate();
        } catch (e) { alert("辨識出錯"); }
        loader.style.display = 'none';
    };

    window.finishReview = function() {
        showPage('page-treasure');
    };

    window.openChest = function(el) {
        el.style.animation = "shake 0.5s 2";
        const score = workbook.filter(i => i.status === true).length;
        setTimeout(() => {
            document.querySelectorAll('.chest').forEach(c => c.style.opacity = "0");
            const reveal = document.getElementById('prize-reveal'); reveal.style.display = "block";
            if (score >= (maxChallenges * 0.8)) {
                const ungot = defaultSpells.filter(s => !mySpells.some(m => m.n === s.n));
                const prize = ungot.length > 0 ? ungot[Math.floor(Math.random()*ungot.length)] : defaultSpells[0];
                mySpells.push(prize);
                localStorage.setItem('m_mine_'+currentUser, JSON.stringify(mySpells));
                const stats = getDailyStats(); stats.count++;
                localStorage.setItem('m_daily_'+currentUser, JSON.stringify(stats));
                confetti({ particleCount: 150, spread: 70 });
                document.getElementById('prize-name').innerText = `獲得：${prize.n}`;
            } else {
                document.getElementById('prize-name').innerText = "修煉不足，未獲得卷軸";
            }
        }, 1000);
    };

    function getDailyStats() {
        const today = new Date().toLocaleDateString();
        const key = 'm_daily_' + currentUser;
        let stats = { date: today, count: 0 };
        try {
            const data = localStorage.getItem(key);
            if(data) { const p = JSON.parse(data); if(p.date === today) stats = p; }
        } catch(e) {}
        return stats;
    }

    window.openZoom = function(s) { document.getElementById('zoomed-image').src = s; document.getElementById('photo-modal').style.display = 'flex'; };
    window.closeZoom = function() { document.getElementById('photo-modal').style.display = 'none'; };
    window.stopCameraAndHome = function() { stopCamera(); showPage('page-home'); };

</script>
</body>
</html>
